name: mTLS OpenSSL Handshake Validation

on:
  workflow_dispatch:

jobs:
  openssl-validation:
    name: "OpenSSL mTLS Testing"
    runs-on: ubuntu-latest
    env:
      TARGET_HOST: "api.eis-poc-gateway.com"
      TARGET_PORT: "443"
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: "Task 1: No Client Cert (OpenSSL)"
        continue-on-error: true
        run: |
          echo "--- Testing connection with NO certificate ---"
          curl -v -k -I https://api.eis-poc-gateway.com/api/mtoapi 2>&1 | tee curl_output.txt || true
          
          if grep -q "alert certificate required" curl_output.txt; then
            echo " Ingress correctly rejected request with 'TLS alert: certificate required'."
          elif grep -q "400" curl_output.txt; then
            echo " Ingress rejected the request with HTTP 400."
          else
            echo "ERROR: The connection was not rejected as expected. Check LB settings."
          fi

      - name: "Task 2: Invalid Client Cert (OpenSSL)"
        continue-on-error: true
        run: |
          echo "--- Testing with Invalid/Expired Certificate ---"
          curl -v -k -I --cert ./certs/clientA.pem --key ./certs/clientA.key \
            https://api.eis-poc-gateway.com/api/mtoapi
          
      - name: "Task 3: Regular Client Cert (OpenSSL)"
        continue-on-error: true
        run: |
          echo "--- Verifying Regular Client Handshake ---"
          curl -v -k -I --cert ./certs/regular-client.pem --key ./certs/client.key \
            https://api.eis-poc-gateway.com/api/mtoapi

      - name: "Task 4: Premium Client Cert (OpenSSL)"
        continue-on-error: true
        run: |
          echo "--- Verifying Premium Client Handshake ---"
          curl -v -k -I --cert ./certs/premium-client.pem --key ./certs/client.key \
            https://api.eis-poc-gateway.com/api/mtoapi 
