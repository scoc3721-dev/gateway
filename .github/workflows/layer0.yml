name: mTLS OpenSSL Handshake Validation

on:
  workflow_dispatch:

jobs:
  openssl-validation:
    name: "OpenSSL mTLS Testing"
    runs-on: ubuntu-latest
    env:
      TARGET_HOST: "api.eis-poc-gateway.com"
      TARGET_PORT: "443"
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: "Task 1: No Client Cert (OpenSSL)"
        run: |
          echo "--- Testing connection with NO certificate ---"
          # -quiet prevents full cert dump, focusing on the result
          echo "Q" | openssl s_client -connect $TARGET_HOST:$TARGET_PORT -quiet 2>&1 | tee task1.log || true
          if grep -q "verify error" task1.log; then echo "Handshake failed as expected."; fi

      - name: "Task 2: Invalid Client Cert (OpenSSL)"
        run: |
          echo "--- Testing with Invalid/Expired Certificate ---"
          echo "Q" | openssl s_client -connect $TARGET_HOST:$TARGET_PORT \
            -cert ./certs/clientA.pem \
            -key ./certs/clientB.key \
            -msg 2>&1 | grep -iE "Alert|error|Handshake" || true

      - name: "Task 3: Regular Client Cert (OpenSSL)"
        run: |
          echo "--- Verifying Regular Client Handshake ---"
          # Check 'Acceptable client certificate CA names' sent by the server
          echo "Q" | openssl s_client -connect $TARGET_HOST:$TARGET_PORT \
            -cert ./certs/regular-client.pem \
            -key ./certs/client.key \
            -showcerts | grep -A 5 "Acceptable client certificate CA names" || true
          
          echo "--- Connection Status ---"
          echo "Q" | openssl s_client -connect $TARGET_HOST:$TARGET_PORT \
            -cert ./certs/regular-client.pem \
            -key ./certs/client.key 2>/dev/null 

      - name: "Task 4: Premium Client Cert (OpenSSL)"
        run: |
          echo "--- Verifying Premium Client Handshake ---"
          # This verifies the cipher suite and the successful verification of the chain
          echo "Q" | openssl s_client -connect $TARGET_HOST:$TARGET_PORT \
            -cert ./certs/premium-client.pem \
            -key ./certs/client.key 2>&1 
