name: "L0: Security Connectivity Check"

on:
  workflow_dispatch: # Allows manual trigger from the Actions tab
  push:
    branches: [ main ]

jobs:
  connectivity-test:
    name: mTLS Connectivity Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Basic DNS Check
        run: |
          echo "Checking if the Anypoint Ingress is reachable..."
          # Verified Domain from your previous logs
          nslookup api.eis-poc-gateway.com || echo "DNS Lookup Failed"

      - name: Test Layer 0 - Unauthorized Access (No Certs)
        # We use continue-on-error because we EXPECT a connection failure (SSL Alert) here.
        continue-on-error: true
        run: |
          echo "Scenario: External client attempts to connect without mTLS certs."
          # Capture verbose output to check for the 'certificate required' alert
          curl -v -k -I https://api.eis-poc-gateway.com/api/mtoapi 2>&1 | tee curl_output.txt || true
          
          if grep -q "alert certificate required" curl_output.txt; then
            echo "SUCCESS: Ingress correctly rejected request with 'TLS alert: certificate required'."
          elif grep -q "400" curl_output.txt; then
            echo "SUCCESS: Ingress rejected the request with HTTP 400."
          else
            echo "ERROR: The connection was not rejected as expected. Check LB settings."
            exit 1
          fi

      - name: Test Layer 0 - Authorized Access (With Certs)
        # This step will run once you upload your certificates to the /certs folder in your repo
        continue-on-error: true 
        run: |
          echo "Scenario: External client presents a trusted certificate."
          # Debugging: show files to ensure certs are present
          ls -R ./certs || echo "Certificates directory not found!"
          
          if [ -f "./certs/client.pem" ]; then
            curl -v -k --cert ./certs/client.pem --key ./certs/client.key \
            https://api.eis-poc-gateway.com/api/mtoapi
          else
            echo "SKIP: No certificates found in ./certs/ to perform authorized test."
          fi
