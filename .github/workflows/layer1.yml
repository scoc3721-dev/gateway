name: "L1: Identity Control (JWT Validation)"

on:
  workflow_dispatch: # Allows manual trigger from the Actions tab
  push:
    branches: [ main ]

jobs:
  connectivity-test:
    name: mTLS Connectivity Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Layer 1 - JWT Validation (expired token)
        continue-on-error: true
        run: |
            # --- Configuration ---
            URL="https://api.eis-poc-gateway.com/api/mtoapi"
            CERT_PATH="./certs/regular-client.pem"
            KEY_PATH="./certs/client.key"
            TOKEN_URL="https://poc-jwt-provider-zm63hj.9d3fd9-1.can-c1.cloudhub.io/token1"

            echo "--------------------------------------------------"
            echo "   DEMO: LAYER 1 - IDENTITY CONTROL (JWT VALIDATION)        "
            echo "--------------------------------------------------"
            
            # STEP 1: Get invalid JWT from token provider
            echo "[INFO] sending Expired JWT token ..."
            
            TOKEN=$(curl -s "$TOKEN_URL")
            echo "Request Header:"
            echo "Authorization: Bearer $TOKEN"
            
            RAW_OUTPUT=$(curl -k -i -s \
                --cert "$CERT_PATH" --key "$KEY_PATH" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"opcNumber": "B98765432109"}' \
                -w "\nHTTP_STATUS:%{http_code}" \
                "$URL")
            
            STATUS=$(echo "$RAW_OUTPUT" | grep "HTTP_STATUS:" | cut -d':' -f2)
            BODY=$(echo "$RAW_OUTPUT" | sed '/HTTP_STATUS:/d' | sed '1,/^\r\{0,1\}$/d')
            
            if [ "$STATUS" -eq 200 ]; then
                echo "SUCCESS: Request accepted (200 OK)."
            else
                echo "FAILURE: Request returned $STATUS."
            fi
            
            echo "--------------------------------------------------"
            echo "GATEWAY RESPONSE:"
            echo "$BODY"
            echo "--------------------------------------------------"

      - name: Layer 1 - JWT Validation (valid token)
        continue-on-error: true
        run: |
            # --- Configuration ---
            URL="https://api.eis-poc-gateway.com/api/mtoapi"
            CERT_PATH="./certs/regular-client.pem"
            KEY_PATH="./certs/client.key"
            TOKEN_URL="https://poc-jwt-provider-zm63hj.9d3fd9-1.can-c1.cloudhub.io/token2"

            echo "--------------------------------------------------"
            echo "   DEMO: LAYER 1 - IDENTITY CONTROL (JWT VALIDATION)        "
            echo "--------------------------------------------------"
            
            # STEP 1: Get invalid JWT from token provider
            echo "[INFO] Sending Expired JWT token ..."
            
            TOKEN=$(curl -s "$TOKEN_URL")
            echo "Request Header:"
            echo "Authorization: Bearer $TOKEN"
            
            RAW_OUTPUT=$(curl -k -i -s \
                --cert "$CERT_PATH" --key "$KEY_PATH" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"opcNumber": "B98765432109"}' \
                -w "\nHTTP_STATUS:%{http_code}" \
                "$URL")
            
            STATUS=$(echo "$RAW_OUTPUT" | grep "HTTP_STATUS:" | cut -d':' -f2)
            BODY=$(echo "$RAW_OUTPUT" | sed '/HTTP_STATUS:/d' | sed '1,/^\r\{0,1\}$/d')
            
            if [ "$STATUS" -eq 200 ]; then
                echo "SUCCESS: Request accepted (200 OK)."
            else
                echo "FAILURE: Request returned $STATUS."
            fi
            
            echo "--------------------------------------------------"
            echo "GATEWAY RESPONSE:"
            echo "$BODY"
            echo "--------------------------------------------------"            
