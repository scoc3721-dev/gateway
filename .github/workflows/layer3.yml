name: L3: Message Integrity Schema Validation

on:
  workflow_dispatch: 
  push:
    branches: [ main ]

jobs:
  security-tests:
    name: Message Integrity Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Layer 3 - Schema Validation (Alphanumeric Pattern)
        continue-on-error: true
        run: |
          echo "Scenario: Sending opcNumber with special characters (Invalid Pattern)."
          # Pattern is ^[A-Z0-9]+$. We will send 'A123-456' (contains a hyphen)
          BAD_PATTERN_PAYLOAD='{"opcNumber": "A123-456"}'
          
          STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" \
            --cert ./.certs/client.pem --key ./.certs/client.key \
            -H "Content-Type: application/json" \
            -d "$BAD_PATTERN_PAYLOAD" https://api.eis-poc-gateway.com/api/mtoapi)
          
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" == "400" ]; then
            echo "SUCCESS: Flex Gateway rejected invalid pattern (Layer 3)."
          else
            echo "ERROR: Gateway allowed invalid pattern."
            exit 1
          fi

      - name: Layer 3 - Schema Validation (Additional Properties)
        continue-on-error: true
        run: |
          echo "Scenario: Sending valid opcNumber but with extra undefined fields."
          # Specification says additionalProperties: false
          EXTRA_FIELDS_PAYLOAD='{"opcNumber": "A123456789", "malicious_field": "true"}'
          
          STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" \
            --cert ./.certs/client.pem --key ./.certs/client.key \
            -H "Content-Type: application/json" \
            -d "$EXTRA_FIELDS_PAYLOAD" https://api.eis-poc-gateway.com/api/mtoapi)
          
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" == "400" ]; then
            echo "SUCCESS: Flex Gateway rejected additional properties (Layer 3)."
          else
            echo "ERROR: Gateway allowed additional properties."
            exit 1
          fi

      - name: Layer 3 - Success Path (Valid Schema)
        run: |
          echo "Scenario: Sending a perfectly valid request."
          VALID_PAYLOAD='{"opcNumber": "A123456789"}'
          
          STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" \
            --cert ./.certs/client.pem --key ./.certs/client.key \
            -H "Content-Type: application/json" \
            -d "$VALID_PAYLOAD" https://api.eis-poc-gateway.com/api/mtoapi)
          
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" == "200" ]; then
            echo "SUCCESS: API processed the valid request."
          else
            echo "Note: Received $STATUS. Ensure backend is up and JWT is disabled for this step."
          fi