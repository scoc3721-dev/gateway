name: "L3: Message Integrity Schema Validation"

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  schema-validation:
    name: "Schema Integrity Test"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Layer 3 - Missing Mandatory Field (Empty Body)
        # Expected: 400 Bad Request
        # opcNumber is required in the schema.
        continue-on-error: true
        run: |
          echo "Scenario: Sending an empty JSON object {}"
          PAYLOAD='{}'
          
          STATUS=$(curl -k -v  \
            --cert ./certs/client.pem --key ./certs/client.key \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" https://api.eis-poc-gateway.com/api/mtoapi)
          
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" == "400" ]; then
            echo "SUCCESS: Flex Gateway rejected request missing required opcNumber."
          else
            echo "ERROR: Gateway allowed request with missing mandatory fields (Status: $STATUS)."
            exit 1
          fi

      - name: Layer 3 - Invalid Pattern (Regex Check)
        # Expected: 400 Bad Request
        # The regex is ^[A-Z0-9]+$. We send a hyphen '-' to trigger a block.
        continue-on-error: true
        run: |
          echo "Scenario: Sending opcNumber with invalid characters (A123-456)"
          PAYLOAD='{"opcNumber": "A123-456"}'
          
          STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" \
            --cert ./certs/client.pem --key ./certs/client.key \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" https://api.eis-poc-gateway.com/api/mtoapi)
          
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" == "400" ]; then
            echo "SUCCESS: Flex Gateway rejected invalid pattern."
          else
            echo "ERROR: Gateway allowed invalid pattern (Status: $STATUS)."
            exit 1
          fi


      - name: Layer 3 - Undefined Fields (Strict Mode)
        # Expected: 400 Bad Request
        # additionalProperties: false is set in the schema.
        continue-on-error: true
        run: |
          echo "Scenario: Sending valid opcNumber with an extra 'hack' field."
          PAYLOAD='{"opcNumber": "A123456789", "hack": "true"}'
          
          STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" \
            --cert ./certs/client.pem --key ./certs/client.key \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" https://api.eis-poc-gateway.com/api/mtoapi)
          
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" == "400" ]; then
            echo "SUCCESS: Flex Gateway rejected additional properties."
          else
            echo "ERROR: Gateway allowed undefined fields (Status: $STATUS)."
            exit 1
          fi

      - name: Layer 3 - Success Path (Valid Payload)
        # Expected: 200 OK
        run: |
          echo "Scenario: Sending a perfectly valid request (A123456789)"
          PAYLOAD='{"opcNumber": "B98765432109"}'
          
          STATUS=$(curl -k -v  \
            --cert ./certs/client.pem --key ./certs/client.key \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" https://api.eis-poc-gateway.com/api/mtoapi)
          
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" == "200" ]; then
            echo "SUCCESS: API processed the valid request."
          else
            echo "FAILED: Received $STATUS. Verify mTLS certs and Backend availability."
            exit 1
          fi
