name: MTO Security Layer Validation

on:
  workflow_dispatch: # Allows manual trigger from the Actions tab
  push:
    branches: [ main ]

jobs:
  connectivity-test:
    name: Hello World Connectivity Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Basic DNS & Ping Check
        run: |
          echo "Checking if the Anypoint Ingress is reachable..."
          # Replace with your actual domain
          nslookup api.eis-poc-gateway.com || echo "DNS Lookup Failed - Check if URL is public"

      - name: Test Layer 0 - Unauthorized Access (Hello World)
        run: |
          echo "Scenario: External client attempts to connect without mTLS certs."
          # -v provides verbose output to see the TLS handshake details
          # -k ignores SSL chain issues (useful for self-signed LB certs)
          curl -v -k -s -o /dev/null -w "%{http_code}" https://api.eis-poc-gateway.com/api/mtoapi > status.txt
          
          STATUS=$(cat status.txt)
          echo "HTTP Status Received: $STATUS"
          
          if [[ "$STATUS" == "000" ]]; then
            echo "SUCCESS: Connection refused (mTLS working as expected)."
          elif [[ "$STATUS" == "400" ]]; then
            echo "SUCCESS: Ingress rejected the request for missing cert (HTTP 400)."
          else
            echo "WARNING: Received status $STATUS. Is mTLS 'Mandatory' on the LB?"
          fi

      - name: Test Layer 0 - Authorized Access (With Certs)
        # Only run this if you have uploaded certs to the /certs folder in your repo
        continue-on-error: true 
        run: |
          echo "Scenario: External client presents a trusted certificate."
          # Ensure your certs are in the 'certs' folder of your repo
          curl -v -k --cert ./certs/client.pem --key ./certs/client.key \
          https://api.eis-poc-gateway.com/api/mtoapi
