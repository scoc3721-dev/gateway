name: MTO Security Layer Validation

on:
  workflow_dispatch: # Allows manual trigger from the Actions tab
  push:
    branches: [ main ]

jobs:
  connectivity-test:
    name: Hello World Connectivity Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Basic DNS Check
        run: |
          echo "Checking if the Anypoint Ingress is reachable..."
          # Verified Domain from Logs: api.eis-poc-gateway.com
          nslookup api.eis-poc-gateway.com || echo "DNS Lookup Failed"

      - name: Test Layer 0 - Unauthorized Access (Hello World)
        run: |
          echo "Scenario: External client attempts to connect without mTLS certs."
          # We use || true because we expect curl to fail with an SSL Alert (Exit Code 56)
          # We capture the full verbose output to check for the 'certificate required' alert
          curl -v -k https://api.eis-poc-gateway.com/api/mtoapi 2>&1 | tee curl_output.txt || true
          
          if grep -q "alert certificate required" curl_output.txt; then
            echo "SUCCESS: Ingress correctly rejected request with 'TLS alert: certificate required'."
          elif grep -q "400" curl_output.txt; then
            echo "SUCCESS: Ingress rejected the request with HTTP 400."
          else
            echo "ERROR: The connection was not rejected as expected. Check LB settings."
            exit 1
          fi

      - name: Test Layer 0 - Authorized Access (With Certs)
        # This step will run once you upload your certificates to the /certs folder
        continue-on-error: true 
        run: |
          echo "Scenario: External client presents a trusted certificate."
          # Ensure client.pem and client.key are in the 'certs' folder
          curl -v -k --cert ./certs/client.pem --key ./certs/client.key \
          https://api.eis-poc-gateway.com/api/mtoapi
