name: "L4: Identity Bridge (Outbound JWT Generation)"

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  identity-bridge-test:
    name: Identity Bridge Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Layer 4 - Verify Outbound JWT Generation
        run: |
          # Configuration
          API_URL="https://api.eis-poc-gateway.com/api/mtoapi"
          CERT="./certs/regular-client.pem"
          KEY="./certs/client.key"
          REGULAR_CLIENT_ID="fd6a16c7a11d48038f1bc3147a0982a8"
          REGULAR_CLIENT_SECRET="79AC5CAE6c83431CB422A61BA4e6e156"          

          TOKEN_URL="https://poc-jwt-provider-zm63hj.9d3fd9-1.can-c1.cloudhub.io/token2"
          TOKEN=$(curl -s "$TOKEN_URL")
          
          echo "=================================================="
          echo "  DEMO: LAYER 4 - Identity Bridge (Outbound)"
          echo "  Action: Mapping Cert CN to Internal JWT"
          echo "  Target: $API_URL"
          echo "=================================================="

          # Ensure the curl command is on one line or uses proper line continuations
          # We check the response headers (-i) and status code (-w)
          RAW_OUTPUT=$(curl -k -i \
            --cert "$CERT" \
            --key "$KEY" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"opcNumber": "B98765432109"}' \
            -w "\nHTTP_STATUS:%{http_code}" \
            "$API_URL")

          STATUS=$(echo "$RAW_OUTPUT" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RAW_OUTPUT" | sed '/HTTP_STATUS:/d' | sed '1,/^\r\{0,1\}$/d')
          HEADERS=$(echo "$RAW_OUTPUT" | sed '/^\r\{0,1\}$/q')
          
          echo "RESULT STATUS CODE: $STATUS"
          echo "RESPONSE BODY: $BODY"
          echo "Headers: $HEADERS"
          echo "--------------------------------------"
          
