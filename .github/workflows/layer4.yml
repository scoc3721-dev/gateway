name: "L4: Identity Bridge (Outbound JWT Generation)"

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  identity-bridge-test:
    name: Identity Bridge Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Certificates
        run: |
          mkdir -p ./certs
          # Using default values if secrets are missing for the sake of the demo structure
          echo "${{ secrets.CLIENT_PEM }}" > ./certs/client.pem
          echo "${{ secrets.CLIENT_KEY }}" > ./certs/client.key

      - name: Layer 4 - Verify Outbound JWT Generation
        run: |
          # Configuration
          API_URL="https://api.eis-poc-gateway.com/api/mtoapi"
          CERT="./certs/client.pem"
          KEY="./certs/client.key"
          
          echo "=================================================="
          echo "  DEMO: LAYER 4 - Identity Bridge (Outbound)"
          echo "  Action: Mapping Cert CN to Internal JWT"
          echo "  Target: $API_URL"
          echo "=================================================="

          # Ensure the curl command is on one line or uses proper line continuations
          # We check the response headers (-i) and status code (-w)
          RAW_OUTPUT=$(curl -k -i -s \
            --cert "$CERT" \
            --key "$KEY" \
            -H "Content-Type: application/json" \
            -d '{"opcNumber": "A123456789"}' \
            -w "\nHTTP_STATUS:%{http_code}" \
            "$API_URL")

          STATUS=$(echo "$RAW_OUTPUT" | grep "HTTP_STATUS:" | cut -d':' -f2)
          
          echo "Response Status: $STATUS"
          echo "--------------------------------------------------"
          
          if [ "$STATUS" -eq 200 ]; then
            echo "RESULT: SUCCESS - Gateway processed mTLS and injected Outbound JWT."
            echo "The Upstream application authorized the request based on the Bridged Identity."
          elif [ "$STATUS" -eq 500 ]; then
             echo "RESULT: ERROR 500 - Check Flex Gateway Outbound Policy Logs."
             exit 1
          else
            echo "RESULT: FAIL - Unexpected Status Code: $STATUS"
            exit 1
          fi
          echo "=================================================="
