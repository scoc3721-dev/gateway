name: "L4: Identity Bridge (Outbound JWT Generation)"

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  identity-bridge-test:
    name: Identity Bridge Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Certificates
        run: |
          mkdir -p ./certs
          echo "${{ secrets.CLIENT_PEM }}" > ./certs/client.pem
          echo "${{ secrets.CLIENT_KEY }}" > ./certs/client.key

      - name: Layer 4 - Verify Outbound JWT Generation
        run: |
          URL="https://api.eis-poc-gateway.com/api/mtoapi"
          CERT_PATH="./certs/client.pem"
          KEY_PATH="./certs/client.key"
          
          echo "=================================================="
          echo "  DEMO: LAYER 4 - Identity Bridge (Outbound)"
          echo "  Action: Mapping Cert CN to Internal JWT"
          echo "=================================================="

          # We send the request WITHOUT an Authorization header.
          # The Gateway should generate one OUTBOUND.
          RAW_OUTPUT=$(curl -k -i -s \
            --cert "$CERT_PATH" --key "$KEY_PATH" \
            -H "Content-Type: application/json" \
            -d '{"opcNumber": "A123456789"}' \
            -w "\nHTTP_STATUS:%{http_code}")

          STATUS=$(echo "$RAW_OUTPUT" | grep "HTTP_STATUS:" | cut -d':' -f2)
          
          # Assuming your upstream mirrors headers back for the demo 
          # Or we look for a specific success signal from the backend
          echo "Response Status: $STATUS"
          echo "--------------------------------------------------"
          
          if [ "$STATUS" -eq 200 ]; then
            echo "RESULT: SUCCESS - Backend received and authorized the Bridged JWT."
            # Optional: If backend echoes headers, we can extract the token here
            # TOKEN=$(echo "$RAW_OUTPUT" | grep -i "x-internal-token-echo" | awk '{print $2}')
            # echo "Bridged Token detected: ${TOKEN:0:30}..."
          else
            echo "RESULT: FAIL - Backend did not receive a valid Bridged JWT (Status: $STATUS)"
            exit 1
          fi
          echo "=================================================="
